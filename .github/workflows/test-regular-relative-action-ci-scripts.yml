name: 'Test: Regular + Relative Action + CI Scripts'

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Run via relative action
        uses: ./.github/actions/relative-regular-ci-scripts
